<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ئەنجامی MBTI</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
<base target="_blank">
</head>
<body>
  <div class="card fade-in">
    <div style="font-size: 18px; color: rgba(255,255,255,0.5); margin-bottom: 8px;">ئەنجامی تاقیکردنەوەکەت</div>
    <div class="result-type" id="mbti-type"></div>
    <div class="result-desc" id="mbti-desc"></div>
    <button class="start-btn" onclick="window.location.href='index.html'">دووبارە تاقیکردنەوە</button>
  </div>

  <script>
    const descriptions = {
      "ISTJ": "ڕاستگۆ، باوەڕپێکراو، ڕێکخستراو — تۆ کەسێکی بەڕێوەبەر و وردیت",
      "ISFJ": "دڵسۆز، پارێزەر، ورد — تۆ کەسێکی یارمەتیدەر و دڵگەرمیت",
      "INFJ": "ئیلهامبەخش، ئارام، داهاتوخواز — تۆ کەسێکی بیرکەرەوە و دڵسۆزیت",
      "INTJ": "ستراتێژ، ڕەخنەگر، سەربەخۆ — تۆ کەسێکی پلاندار و داهاتوخوازیت",
      "ISTP": "لێکۆڵەر، پراکتیکی، ئاسودە — تۆ کەسێکی چارەسەرکەر و ئازادیت",
      "ISFP": "هونەرمەند، ئاسودە، گۆڕاوپەسەند — تۆ کەسێکی هەستەوار و نەرمتی",
      "INFP": "ئیلهامبەخش، دڵسۆز، خەیاڵپەسەند — تۆ کەسێکی خەیاڵپەسەند و دڵگەرمیت",
      "INTP": "بیرکەرەوە، تاقیکەرەوە، بێلایەن — تۆ کەسێکی زیرەک و حەزی لێکۆڵینەوەیە",
      "ESTP": "چالاک، پراکتیکی، ڕاستەوخۆ — تۆ کەسێکی چالاک و سەرکێشیت",
      "ESFP": "خۆشەویست، چالاک، گۆڕاوپەسەند — تۆ کەسێکی خۆشەویست و ژیانخۆشیت",
      "ENFP": "ئیلهامبەخش، چالاک، خەیاڵپەسەند — تۆ کەسێکی ئازاد و داهاتوخوازیت",
      "ENTP": "نوێخواز، چالاک، تاقیکەرەوە — تۆ کەسێکی زیرەک و حەزی گفتوگۆیە",
      "ESTJ": "ڕێکخستراو، ڕاستگۆ، بەڕێوەبەر — تۆ کەسێکی بڕیاردەر و ڕێکخستراو",
      "ESFJ": "دڵسۆز، کۆمەڵایەتی، یارمەتیدەر — تۆ کەسێکی گرنگیدەر و کۆمەڵایەتیت",
      "ENFJ": "ڕابەر، دڵسۆز، ئیلهامبەخش — تۆ کەسێکی ڕابەر و هانادەریت",
      "ENTJ": "ڕابەر، ستراتێژ، بڕیاردەر — تۆ کەسێکی بەهێز و ئامانجدار"
    };

    const params = new URLSearchParams(window.location.search);
    const type = params.get("type") || "Unknown";
    document.getElementById("mbti-type").textContent = type;
    document.getElementById("mbti-desc").textContent = descriptions[type] || "";
  </script>
</body>
</html>
